<!DOCTYPE html>
<html lang="en">
<head>
<style>
a.hover{
    color: red;
}
input:focus{
    background-color: lightyellow;
}
li:nth-child(2){
    color: blue;
}
button:active{
    background-color: green;
}
</style>
</head>
<body>
    <h2> Pseudo-classes demo</h2>
    <a href="#">Hover over me</a><br><br>
    <input type="text" placeholder="click here"><br><br>
    <ul>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
    </ul>
    <button>Click me</button>
</body>
</html>
